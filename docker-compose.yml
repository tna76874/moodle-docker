services:

  moodle_db:
    image: mariadb:${MARIADB_TAG:-10.11}
    restart: always
    volumes:
      - './data/db:/var/lib/mysql'
    environment:
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
      - MYSQL_ONETIME_PASSWORD=yes
      - MYSQL_DATABASE=${MOODLE_DB_NAME:-moodle}
      - MYSQL_USER=${MOODLE_DB_USER:-admin}
      - MYSQL_PASSWORD=${MOODLE_DB_PASSWORD}

  redis:
    image: redis:${REDIS_TAG:-latest}
    restart: always

  memcached:
    image: memcached:${MEMCACHED_TAG:-alpine}
    restart: always
    expose:
      - "11211"

  moodle:
    image: ghcr.io/tna76874/moodle-docker:${MOODLE_DOCKER_TAG:-latest}
    restart: always
    volumes:
      - './data/moodle:/var/moodledata'
      - './data/moodle/www:/var/www/html'
    ports:
      - '127.0.0.1:${COMPOSE_PORT:-3454}:80'
    configs:
      - source: php_upload_limit
        target: /usr/local/etc/php/conf.d/uploads.ini
      - source: moodle_apache_conf
        target: /etc/apache2/sites-available/000-default.conf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 60s
      retries: 5
      start_period: 300s
      timeout: 15s
    depends_on:
      - moodle_db
      - redis
      - memcached
    environment:
      - MOODLE_URL=${MOODLE_URL}
      - MOODLE_ADMIN=${MOODLE_ADMIN:-admin}
      - MOODLE_ADMIN_PASSWORD=${MOODLE_ADMIN_PASSWORD}
      - MOODLE_ADMIN_EMAIL=${MOODLE_ADMIN_EMAIL:-info@local.de}
      - MOODLE_DB_TYPE=mysqli
      - MOODLE_DB_HOST=moodle_db
      - MOODLE_DB_USER=${MOODLE_DB_USER:-admin}
      - MOODLE_DB_PASSWORD=${MOODLE_DB_PASSWORD}
      - MOODLE_DB_NAME=${MOODLE_DB_NAME:-moodle}
      - MOODLE_REVERSE_LB=0
      - MOODLE_SSL=1
      - MOODLE_EMAIL_TYPE_QMAIL=false
      - MOODLE_EMAIL_HOST=${MOODLE_EMAIL_HOST}
      - PHP_UPLOAD_LIMIT=${UPLOAD_LIMIT:-200M}

  tunnel:
      image: cloudflare/cloudflared:latest
      restart: always
      command: tunnel --url http://moodle:80
      profiles:
        - optional-tunnel
      logging:
        driver: json-file
        options:
          max-size: "10m"


configs:
  php_upload_limit:
    content: |
      upload_max_filesize = ${UPLOAD_LIMIT:-200M}
      post_max_size = ${UPLOAD_LIMIT:-200M}
      memory_limit = 512M
      max_execution_time = 300
  moodle_apache_conf:
    content: |
      <VirtualHost *:80>
          DocumentRoot /var/www/html/public
          <Directory /var/www/html/public>
              Options Indexes FollowSymLinks
              AllowOverride All
              Require all granted
          </Directory>
          <Directory /var/www/html>
              Options FollowSymLinks
              AllowOverride None
              Require all granted
          </Directory>
          ErrorLog $${APACHE_LOG_DIR}/error.log
          CustomLog $${APACHE_LOG_DIR}/access.log combined
      </VirtualHost>
